# Orion Agent Configuration
# Edite este arquivo antes de iniciar o agente.

# URL do endpoint de heartbeat no Vercel (mesmo domínio do frontend)
# Substitua SEU-DOMINIO pelo domínio do seu projeto Vercel
api_url: https://SEU-DOMINIO.vercel.app/api/monitoring/machines/heartbeat

# Chave de autenticação (deve ser igual ao AGENT_KEY configurado no Vercel)
agent_key: COLOQUE_SUA_CHAVE_AQUI

# Intervalo de envio em segundos (padrão: 60)
interval_seconds: 60

# Nome do arquivo de log (relativo ao diretório do .exe)
log_file: agent.log
